apiVersion: v1
kind: ConfigMap
metadata:
  name: jwtlet-config
  namespace: edc-v
data:
  jwtlet.toml: |
    [storage_backend]
    type = "postgres"
    url  = "postgresql://jwtlet:jwtlet@postgres:5432/jwtlet"

    [k8s]
    api_server_url  = "https://kubernetes.default.svc"
    cluster_issuer  = "https://kubernetes.default.svc.cluster.local"

    [token]
    client_audience = "https://kubernetes.default.svc.cluster.local"
    audience        = "jwtlet-e2e"

    [vault]
    url        = "http://vault.edc-v.svc.cluster.local:8200"
    token_file = "/vault/secrets/.vault-token"

    [service_accounts]
    "system:serviceaccount:edc-v:test-app-sa" = ["jwtlet:management:mappings:write", "jwtlet:management:scope:write"]
    "system:serviceaccount:edc-v:cfm" = ["jwtlet:management:mappings:write", "jwtlet:management:scope:write", "jwtlet:management:read"]
