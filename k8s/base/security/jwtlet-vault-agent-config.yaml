# Vault Agent config for the jwtlet sidecar.
# The agent authenticates as jwtlet-sa via Kubernetes auth and writes the
# resulting token to /vault/secrets/.vault-token for jwtlet to read.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config-jwtlet
  namespace: edc-v
  labels:
    type: edcv-infra
data:
  agent.hcl: |
    pid_file = "/tmp/vault-agent.pid"

    vault {
      address = "http://vault.edc-v.svc.cluster.local:8200"
    }

    auto_auth {
      method {
        type = "kubernetes"

        config = {
          role = "jwtlet-role"
        }
      }

      sink {
        type = "file"
        config = {
          path = "/vault/secrets/.vault-token"
          mode = 0644
        }
      }
    }
