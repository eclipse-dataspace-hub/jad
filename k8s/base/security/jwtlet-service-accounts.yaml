# Service account for the jwtlet server itself
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jwtlet-sa
  namespace: edc-v

---
# Service account used as the token subject for CFM
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cfm-agents
  namespace: edc-v

---
# Vault's own service account (needed for Kubernetes auth method)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: edc-v

---
# ClusterRole allowing TokenReview API calls
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-token-reviewer
  namespace: edc-v
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create

---
# Vault needs TokenReview to verify SA tokens for its Kubernetes auth method
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-token-reviewer-binding
  namespace: edc-v
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-token-reviewer
subjects:
- kind: ServiceAccount
  name: vault-auth
  namespace: edc-v

---
# jwtlet needs TokenReview to verify incoming subject tokens (RFC 8693)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jwtlet-token-reviewer-binding
  namespace: edc-v
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-token-reviewer
subjects:
- kind: ServiceAccount
  name: jwtlet-sa
  namespace: edc-v
